<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Certificados - SIGAC</title>

    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="validacao.css">
    <link rel="stylesheet" href="alunos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="dashboard-body">
    <main class="content">
        
        <header class="top-bar">
            <div class="user-welcome">
                <h1>Certificados</h1>
                <p>Analise e valide os certificados enviados pelos alunos</p>
            </div>
        </header>

<a href="upload-certificado.html" class="btn-primary" style="margin-top: 15px;">
    <i class="fa-solid fa-plus"></i> Enviar Certificado
</a>

        <!-- =========================
             TABS / FILTROS
        ========================== -->
        <div class="tabs-container" style="margin-top: 20px;">

            <button class="tab-btn active" data-status="pendente">
                Pendentes <span class="badge" id="count-pendente">0</span>
            </button>

            <button class="tab-btn" data-status="aprovado">
                Aprovados <span class="badge" id="count-aprovado">0</span>
            </button>

            <button class="tab-btn" data-status="rejeitado">
                Rejeitados <span class="badge" id="count-rejeitado">0</span>
            </button>

        </div>

        <section class="certificates-list" id="listaCertificados">

            <div style="padding: 20px; text-align: center; color: #64748b;">
                Carregando certificados...
            </div>

        </section>

    </main>

    <script type="module" src="validacao.js"></script>
</body>
</html>
