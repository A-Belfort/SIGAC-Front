<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Certificado - SIGAC</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="validacao.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body class="dashboard-body">

    <main class="content">

        <div class="form-container">
            <h2><i class="fa-solid fa-file-arrow-up"></i> Enviar Certificado</h2>

            <form id="formCertificado">

                <div class="form-group">
                    <label>Título do Certificado</label>
                    <input type="text" id="titulo" required>
                </div>

                <!-- SELECT DE ALUNOS -->
                <div class="form-group">
                    <label>Aluno</label>
                    <select id="aluno" required>
                        <option value="">Selecione um aluno</option>
                    </select>
                </div>

                <!-- CARGA HORÁRIA -->
                <div class="form-group">
                    <label>Carga Horária (horas)</label>
                    <input type="number" id="cargaHoraria" min="1" required>
                </div>

                <div class="form-group">
                    <label>Arquivo (PDF ou imagem)</label>
                    <input type="file" id="arquivo" accept=".pdf,image/*" required>
                </div>

                <button type="submit" class="btn-submit">
                    Enviar Certificado
                </button>

            </form>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const selectAluno = document.getElementById('aluno');

            // =========================
            // CARREGAR ALUNOS
            // =========================
            function carregarAlunos() {
                const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

                const alunos = usuarios.filter(u => u.tipo === 'aluno');

                alunos.forEach(aluno => {
                    selectAluno.innerHTML += `
                        <option value="${aluno.id}">
                            ${aluno.nome} (Matrícula: ${aluno.matricula})
                        </option>
                    `;
                });
            }

            carregarAlunos();

            // =========================
            // ENVIO DO FORM
            // =========================
            document.getElementById('formCertificado').addEventListener('submit', function(e) {
                e.preventDefault();

                const titulo = document.getElementById('titulo').value;
                const alunoId = Number(selectAluno.value);
                const cargaHoraria = Number(document.getElementById('cargaHoraria').value);

                const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
                const aluno = usuarios.find(u => u.id === alunoId);

                if (!aluno) {
                    alert('Aluno inválido');
                    return;
                }

                const file = document.getElementById('arquivo').files[0];

                if (!file) {
                    alert('Selecione um arquivo');
                    return;
                }

                const reader = new FileReader();

                reader.onload = function() {

                    const certificados = JSON.parse(localStorage.getItem('certificados')) || [];

                    const novoCertificado = {
                        id: Date.now(),
                        titulo,
                        aluno: aluno.nome,
                        alunoId: aluno.id,
                        emailAluno: aluno.email, // 🔥 ESSENCIAL PARA EMAIL
                        cargaHoraria,
                        status: 'pendente',
                        arquivo: reader.result
                    };

                    certificados.push(novoCertificado);

                    localStorage.setItem('certificados', JSON.stringify(certificados));

                    alert('Certificado enviado com sucesso!');

                    window.location.href = 'validacao.html';
                };

                reader.readAsDataURL(file);
            });

        });
    </script>

</body>
</html>
